upstream backend_upstream {
    server backend:8888;
    keepalive 32;
}

upstream minio_upstream {
    server minio:9000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;
    charset utf-8;

    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /storage {
        return 301 /storage/;
    }

    location ^~ /images/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, PUT, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, x-amz-date, x-amz-content-sha256, x-amz-security-token, x-amz-user-agent" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Vary Origin always;
            return 204;
        }

        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, PUT, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, x-amz-date, x-amz-content-sha256, x-amz-security-token, x-amz-user-agent" always;
        add_header Vary Origin always;
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_pass http://minio_upstream;
        proxy_set_header Host minio:9000;
    }

    location ^~ /storage/ {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Vary Origin always;
        proxy_pass http://minio_upstream/images/;
        proxy_set_header Host minio:9000;
    }

    location ~ ^/(api|v1)(/|$) {
        proxy_pass http://backend_upstream;
    }

    location = /health {
        proxy_pass http://backend_upstream;
    }

    location ^~ /docs {
        proxy_pass http://backend_upstream;
    }

    location ^~ /redoc {
        proxy_pass http://backend_upstream;
    }

    location = /openapi.json {
        proxy_pass http://backend_upstream;
    }

    location ~* \.(?:css|js|mjs|json|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
