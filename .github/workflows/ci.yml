name: CI

on:
  pull_request:

permissions:
  contents: read

env:
  UV_DEFAULT_INDEX: https://mirrors.aliyun.com/pypi/simple/
  PIP_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv -i https://mirrors.aliyun.com/pypi/simple/

      - name: Install backend dependencies
        run: uv sync --frozen --extra dev

      - name: Run backend tests
        run: uv run pytest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Free runner disk space before Docker build
        run: |
          echo "Disk usage before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          docker system prune -af || true
          docker builder prune -af || true
          echo "Disk usage after cleanup:"
          df -h

      - name: Validate docker compose file
        run: docker compose -f docker-compose.yml config

      - name: Build backend image
        run: docker build -t img-batch-agent-backend .

      - name: Validate nginx configuration
        run: |
          docker run --rm \
            --add-host backend:127.0.0.1 \
            --add-host minio:127.0.0.1 \
            -v "$PWD/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            -v "$PWD/web/dist:/usr/share/nginx/html:ro" \
            nginx:1.27-alpine nginx -t
