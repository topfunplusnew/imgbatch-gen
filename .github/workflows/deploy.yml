name: Deploy Production

on:
  push:
    branches: [release]
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_DEFAULT_INDEX: https://mirrors.aliyun.com/pypi/simple/
  PIP_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build:
    if: github.ref_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv -i https://mirrors.aliyun.com/pypi/simple/

      - name: Install backend dependencies
        run: uv sync --frozen --extra dev

      - name: Run backend tests
        shell: bash
        run: |
          set -euo pipefail
          set +e
          uv run pytest
          status=$?
          set -e
          if [ "$status" -eq 5 ]; then
            echo "No pytest tests were collected, continuing release build."
            exit 0
          fi
          exit "$status"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Validate docker compose file
        run: docker compose -f docker-compose.yml config

      - name: Validate nginx configuration
        run: |
          docker run --rm \
            --add-host backend:127.0.0.1 \
            --add-host minio:127.0.0.1 \
            -v "$PWD/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            -v "$PWD/web/dist:/usr/share/nginx/html:ro" \
            nginx:1.27-alpine nginx -t

      - name: Prepare deploy payload
        run: |
          mkdir -p deploy-root/web
          cp Dockerfile .dockerignore pyproject.toml uv.lock README.md docker-compose.yml env.example deploy-root/
          cp -r src deploy-root/src
          if [ -d migrations ]; then cp -r migrations deploy-root/; fi
          if [ -d sql ]; then cp -r sql deploy-root/; fi
          cp web/nginx.conf web/.env.production deploy-root/web/
          tar czf deploy-root.tgz -C deploy-root .
          tar czf frontend-dist.tgz -C web/dist .

      - name: Upload deploy payload
        uses: actions/upload-artifact@v4
        with:
          name: deploy-root
          path: deploy-root.tgz

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tgz

  deploy:
    needs: build
    if: github.ref_name == 'release'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download deploy payload
        uses: actions/download-artifact@v4
        with:
          name: deploy-root
          path: artifacts

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts

      - name: Extract deployment artifacts
        run: |
          mkdir -p deploy-root web/dist
          tar xzf artifacts/deploy-root.tgz -C deploy-root
          tar xzf artifacts/frontend-dist.tgz -C web/dist

      - name: Configure SSH
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          python - <<'PY'
          import base64
          import os
          import sys

          raw = os.environ["DEPLOY_SSH_KEY"].strip().strip('"').strip("'")
          output_path = os.path.expanduser("~/.ssh/id_ed25519")

          if "\\n" in raw and "BEGIN " in raw:
              key_text = raw.replace("\\r", "").replace("\\n", "\n")
              if not key_text.endswith("\n"):
                  key_text += "\n"
              key_bytes = key_text.encode("utf-8")
          elif "BEGIN " in raw:
              key_text = raw.replace("\r", "")
              if not key_text.endswith("\n"):
                  key_text += "\n"
              key_bytes = key_text.encode("utf-8")
          else:
              compact = "".join(raw.replace("\r", "").split())
              try:
                  key_bytes = base64.b64decode(compact, validate=True)
              except Exception as exc:
                  sys.stderr.write(
                      "DEPLOY_SSH_KEY is not a valid private key. "
                      "Provide raw multiline key text, a single-line key with literal \\\\n, "
                      "or a base64-encoded private key.\\n"
                  )
                  raise

          with open(output_path, "wb") as fh:
              fh.write(key_bytes)
          PY
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Show SSH diagnostics
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          echo "Deploy target: $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PORT"
          echo "Private key fingerprint:"
          ssh-keygen -lf ~/.ssh/id_ed25519
          echo "Derived public key fingerprint:"
          ssh-keygen -lf ~/.ssh/id_ed25519.pub
          echo "Known hosts entry:"
          ssh-keygen -F "[$DEPLOY_HOST]:$DEPLOY_PORT" -f ~/.ssh/known_hosts || true
          echo "SSH directory permissions:"
          ls -ld ~/.ssh
          ls -l ~/.ssh

      - name: Test SSH connectivity
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 \
            -vvv \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o PreferredAuthentications=publickey \
            -o StrictHostKeyChecking=yes \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" "echo ok"

      - name: Prepare remote directories
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          ssh_cmd="ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p $DEPLOY_PORT"
          $ssh_cmd "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '$DEPLOY_PATH/web' '$DEPLOY_PATH/data' '$DEPLOY_PATH/logs' '$DEPLOY_PATH/storage' '$DEPLOY_PATH/src' '$DEPLOY_PATH/migrations' '$DEPLOY_PATH/sql'"

      - name: Sync files
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          rsync_ssh="ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p $DEPLOY_PORT"

          rsync -az -e "$rsync_ssh" \
            deploy-root/Dockerfile \
            deploy-root/.dockerignore \
            deploy-root/pyproject.toml \
            deploy-root/uv.lock \
            deploy-root/README.md \
            deploy-root/env.example \
            deploy-root/docker-compose.yml \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

          rsync -az --delete -e "$rsync_ssh" \
            deploy-root/src/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/src/"

          if [ -d deploy-root/migrations ]; then
            rsync -az --delete -e "$rsync_ssh" \
              deploy-root/migrations/ \
              "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/migrations/"
          fi

          if [ -d deploy-root/sql ]; then
            rsync -az --delete -e "$rsync_ssh" \
              deploy-root/sql/ \
              "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/sql/"
          fi

          rsync -az -e "$rsync_ssh" \
            deploy-root/web/nginx.conf \
            deploy-root/web/.env.production \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/web/"

          rsync -az --delete -e "$rsync_ssh" web/dist/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/web/dist.new/"

      - name: Remote deploy
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          ssh_cmd="ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p $DEPLOY_PORT"
          $ssh_cmd "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          if [ -f .env ]; then
            set -a
            . ./.env
            set +a
          fi

          compose_cmd=(docker compose)
          if [ -f .env ]; then
            compose_cmd+=(--env-file .env)
          fi
          frontend_port="${FRONTEND_PORT:-8080}"

          if [ ! -d web/dist.new ]; then
            echo "web/dist.new does not exist"
            exit 1
          fi

          "${compose_cmd[@]}" config >/dev/null

          "${compose_cmd[@]}" up -d --build --remove-orphans minio minio-init backend
          for i in $(seq 1 60); do
            backend_status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' img-batch-agent-backend 2>/dev/null || true)"
            echo "Backend status attempt $i: ${backend_status:-missing}"
            if [ "$backend_status" = "healthy" ]; then
              break
            fi
            sleep 2
          done
          if [ "$backend_status" != "healthy" ]; then
            echo "Backend did not become healthy in time"
            "${compose_cmd[@]}" logs --tail=200 backend
            exit 1
          fi

          rollback_frontend() {
            echo "Rolling back frontend dist"
            rm -rf web/dist
            if [ -d web/dist.prev ]; then
              mv web/dist.prev web/dist
              "${compose_cmd[@]}" up -d --force-recreate frontend || true
            fi
          }

          rm -rf web/dist.prev
          if [ -d web/dist ]; then
            mv web/dist web/dist.prev
          fi
          mv web/dist.new web/dist

          "${compose_cmd[@]}" up -d --force-recreate frontend
          for i in $(seq 1 30); do
            frontend_status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' img-batch-agent-frontend 2>/dev/null || true)"
            echo "Frontend status attempt $i: ${frontend_status:-missing}"
            if [ "$frontend_status" = "healthy" ]; then
              break
            fi
            sleep 2
          done
          if [ "$frontend_status" != "healthy" ]; then
            echo "Frontend did not start in time"
            "${compose_cmd[@]}" logs --tail=200 frontend
            rollback_frontend
            exit 1
          fi

          curl -fsS "http://127.0.0.1:${frontend_port}/nginx-health" >/dev/null || {
            "${compose_cmd[@]}" logs --tail=200 frontend
            rollback_frontend
            exit 1
          }
          curl -fsS "http://127.0.0.1:${frontend_port}/api/v1/health/storage" >/dev/null || {
            "${compose_cmd[@]}" logs --tail=200 backend frontend
            rollback_frontend
            exit 1
          }

          rm -rf web/dist.prev
          "${compose_cmd[@]}" ps
          EOF

      - name: Collect remote logs on failure
        if: failure()
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set +e
          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && docker compose --env-file .env ps && echo '--- MINIO LOGS ---' && docker compose --env-file .env logs --tail=200 minio minio-init && echo '--- BACKEND LOGS ---' && docker compose --env-file .env logs --tail=200 backend && echo '--- FRONTEND LOGS ---' && docker compose --env-file .env logs --tail=200 frontend"
