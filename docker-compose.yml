services:
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: img-batch-agent-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: img-batch-agent-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-images}
    command:
      - /bin/sh
      - -c
      - |
        set -e
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; do
          echo "Waiting for MinIO endpoint..."
          sleep 2
        done
        until mc ready local >/dev/null 2>&1; do
          echo "Waiting for MinIO readiness..."
          sleep 2
        done
        mc mb --ignore-existing local/"$$MINIO_BUCKET_NAME"
        mc anonymous set download local/"$$MINIO_BUCKET_NAME"
        if [ "$$MINIO_ACCESS_KEY" != "$$MINIO_ROOT_USER" ]; then
          mc admin user info local "$$MINIO_ACCESS_KEY" >/dev/null 2>&1 || \
            mc admin user add local "$$MINIO_ACCESS_KEY" "$$MINIO_SECRET_KEY"
          mc admin policy attach local readwrite --user "$$MINIO_ACCESS_KEY"
        fi

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: img-batch-agent-backend
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      HOST: 0.0.0.0
      PORT: 8888
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STORAGE_TYPE: ${STORAGE_TYPE:-minio}
      STORAGE_PATH: ${STORAGE_PATH:-/app/storage}
      STORAGE_URL_PREFIX: ${STORAGE_URL_PREFIX:-/storage}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/agent.db}
      DEFAULT_IMAGE_PROVIDER: ${DEFAULT_IMAGE_PROVIDER:-openai}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-relay}
      DEFAULT_EMBEDDING_PROVIDER: ${DEFAULT_EMBEDDING_PROVIDER:-relay}
      RELAY_BASE_URL: ${RELAY_BASE_URL:-https://api.yiwuxueshe.cn}
      RELAY_API_KEY: ${RELAY_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      CONFIG_API_URL: ${CONFIG_API_URL:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-images}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_URL_PREFIX: ${MINIO_URL_PREFIX:-/storage}
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./storage:/app/storage
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8888/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    image: nginx:1.27-alpine
    container_name: img-batch-agent-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./web/dist:/usr/share/nginx/html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  minio_data:
